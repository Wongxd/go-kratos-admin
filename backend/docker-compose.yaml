  admin-service:
    image: go-wind-admin/admin-service
    restart: always
    pull_policy: never
    networks:
      - app-tier
    ports:
      - "7788:7788"
      - "7789:7789"
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      - TZ=Asia/Shanghai
    build:
      context: ./  # 指定 Dockerfile 所在的上下文路径
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: admin
        APP_VERSION: 1.0.0
