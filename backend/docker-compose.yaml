networks:
  app-tier:
    driver: bridge

services:
  postgres:
    image: docker.io/bitnami/postgresql:latest
    restart: always
    ports:
      - "5432:5432"
    networks:
      - app-tier
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=*Abcd123456
      - POSTGRES_DB=gwa
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  #  mysql:
